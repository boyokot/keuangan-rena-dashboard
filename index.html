<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Keuangan Rena</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script><style>
:root{--bg:#07111f;--card:#101d30;--line:#263b57;--text:#edf5ff;--muted:#91a5bc;--green:#36d399;--red:#fb7185;--blue:#60a5fa;--gold:#fbbf24}*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#06101d,#111d30);color:var(--text);font:14px Inter,system-ui,sans-serif}.wrap{max-width:1200px;margin:auto;padding:22px}header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}h1{margin:0;font-size:29px}small,.muted{color:var(--muted)}button,select{background:#18304c;color:white;border:1px solid #365a7f;border-radius:10px;padding:9px 12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}.card{background:rgba(16,29,48,.95);border:1px solid var(--line);border-radius:17px;padding:16px;box-shadow:0 12px 30px #0004}.label{color:var(--muted)}.value{font-size:24px;font-weight:800;margin-top:8px}.good{color:var(--green)}.bad{color:var(--red)}.gold{color:var(--gold)}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}table{width:100%;border-collapse:collapse}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left}td.num{text-align:right}.pill{padding:4px 8px;border-radius:99px;background:#243b56}.bar{height:9px;background:#263b57;border-radius:9px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green))}.thumb{width:54px;height:42px;object-fit:cover;border-radius:7px;border:1px solid #496989;cursor:pointer}.proof{color:#93c5fd}.modal{position:fixed;inset:0;background:#000c;display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal img{max-width:95vw;max-height:90vh;border-radius:12px}.scroll{overflow:auto}.status{margin-top:12px;color:var(--muted)}@media(max-width:800px){.grid,.two{grid-template-columns:1fr 1fr}}@media(max-width:520px){.grid,.two{grid-template-columns:1fr}h1{font-size:24px}th,td{font-size:12px;padding:8px 5px}}
</style></head><body><div class="wrap"><header><div><h1>💰 Keuangan Rena</h1><small>Live dari Google Sheets · akun kas: BCA Syariah</small></div><div><select id="bulan" onchange="render()"><option value="all">Semua bulan</option></select> <button onclick="load()">🔄 Refresh</button></div></header><div id="status" class="status">Memuat data…</div><main id="main" style="display:none"><section class="grid"><div class="card"><div class="label">Pemasukan</div><div id="in" class="value good"></div></div><div class="card"><div class="label">Pengeluaran</div><div id="out" class="value bad"></div></div><div class="card"><div class="label">Saldo BCA Syariah</div><div id="saldo" class="value gold"></div></div><div class="card"><div class="label">Jumlah Transaksi</div><div id="count" class="value"></div></div></section><section class="two"><div class="card"><h3>Arus Kas Bulanan</h3><canvas id="cash"></canvas></div><div class="card"><h3>Pengeluaran per Kategori</h3><canvas id="cat"></canvas></div></section><section class="card" style="margin-top:14px"><h3>🎯 Target Keuangan</h3><div id="targets"></div></section><section class="card scroll" style="margin-top:14px"><h3>Transaksi & Bukti</h3><table><thead><tr><th>Tanggal</th><th>Keterangan</th><th>Kategori</th><th>Tipe</th><th>Nominal</th><th>Bukti</th></tr></thead><tbody id="trx"></tbody></table></section></main></div><div class="modal" id="modal" onclick="this.style.display='none'"><img id="big"></div><script>
const SID='1D6D6MQzfKGNbrJrQuaeAcL_nngnkbwpJUfDCSP0THuE';let all=[],targets=[],charts={};const rp=n=>'Rp '+Math.round(Number(n)||0).toLocaleString('id-ID');
function n(v){if(typeof v==='number')return v;return Number(String(v||'').replace(/[^0-9,-]/g,'').replace(/\./g,'').replace(',','.'))||0}function date(v){if(v instanceof Date)return v;let s=String(v||''),m=s.match(/Date\((\d+),(\d+),(\d+)/);if(m)return new Date(+m[1],+m[2],+m[3]);let p=s.split(' '),mm={Jan:0,Feb:1,Mar:2,Apr:3,Mei:4,Jun:5,Jul:6,Agu:7,Sep:8,Okt:9,Nov:10,Des:11};return p.length===3&&mm[p[1]]!==undefined?new Date(+p[2],mm[p[1]],+p[0]):new Date(s)}
async function sheet(name){let u=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&_=${Date.now()}`,t=await(await fetch(u,{cache:'no-store'})).text(),j=JSON.parse(t.slice(t.indexOf('{'),t.lastIndexOf('}')+1));return (j.table.rows||[]).map(r=>(r.c||[]).map(c=>c?(c.f??c.v??''):''))}
function direct(u){let s=String(u||''),m=s.match(/\/d\/([\w-]+)/);return m?`https://drive.google.com/thumbnail?id=${m[1]}&sz=w1200`:s}function proof(u){if(!u)return'—';let d=direct(u),img=/drive\.google|\.(jpg|jpeg|png|webp)(\?|$)/i.test(u);return img?`<img class="thumb" src="${d}" onclick="show('${d}')" onerror="this.outerHTML='<a class=proof target=_blank href=${u}>Buka</a>'">`:`<a class="proof" target="_blank" href="${u}">Buka</a>`}function show(u){big.src=u;modal.style.display='flex'}
async function load(){status.textContent='Memuat data terbaru…';try{let [tr,tg]=await Promise.all([sheet('Transaksi'),sheet('Target Tabungan')]);all=tr.filter(r=>r[0]||r[1]).map(r=>({tgl:r[0],d:date(r[0]),ket:r[1],kat:r[2],tipe:r[3],nom:n(r[4]),akun:r[5],bukti:r[6]}));targets=tg.filter(r=>r[0]).map(r=>({name:r[0],goal:n(r[1]),got:n(r[2]),deadline:r[5]}));let months=[...new Set(all.filter(x=>!isNaN(x.d)).map(x=>`${x.d.getFullYear()}-${String(x.d.getMonth()+1).padStart(2,'0')}`))].sort().reverse();bulan.innerHTML='<option value="all">Semua bulan</option>'+months.map(x=>`<option>${x}</option>`).join('');render();status.textContent='Terakhir diperbarui '+new Date().toLocaleString('id-ID');main.style.display='block'}catch(e){status.textContent='❌ Gagal memuat: '+e.message}}
function render(){let b=bulan.value,a=b==='all'?all:all.filter(x=>`${x.d.getFullYear()}-${String(x.d.getMonth()+1).padStart(2,'0')}`===b),inc=a.filter(x=>x.tipe==='Pemasukan').reduce((s,x)=>s+x.nom,0),exp=a.filter(x=>x.tipe==='Pengeluaran').reduce((s,x)=>s+x.nom,0);document.getElementById('in').textContent=rp(inc);out.textContent=rp(exp);saldo.textContent=rp(inc-exp);count.textContent=a.length;trx.innerHTML=[...a].reverse().slice(0,100).map(x=>`<tr><td>${x.tgl}</td><td>${x.ket}</td><td>${x.kat}</td><td><span class="pill">${x.tipe}</span></td><td class="num">${rp(x.nom)}</td><td>${proof(x.bukti)}</td></tr>`).join('')||'<tr><td colspan=6>Belum ada transaksi</td></tr>';targetsEl=document.getElementById('targets');targetsEl.innerHTML=targets.map(x=>{let p=x.goal?Math.min(100,x.got/x.goal*100):0;return`<div style="margin:14px 0"><b>${x.name}</b><span style="float:right">${rp(x.got)} / ${rp(x.goal)} (${p.toFixed(1)}%)</span><div class="bar" style="clear:both;margin-top:8px"><div class="fill" style="width:${p}%"></div></div><small>Sisa ${rp(Math.max(0,x.goal-x.got))}${x.deadline?' · Deadline '+x.deadline:''}</small></div>`}).join('');draw(a)}
function draw(a){let mo={},ca={};a.forEach(x=>{let k=isNaN(x.d)?'Lainnya':`${x.d.getFullYear()}-${String(x.d.getMonth()+1).padStart(2,'0')}`;mo[k]??=[0,0];if(x.tipe==='Pemasukan')mo[k][0]+=x.nom;if(x.tipe==='Pengeluaran'){mo[k][1]+=x.nom;ca[x.kat]=(ca[x.kat]||0)+x.nom}});Object.values(charts).forEach(c=>c.destroy());let labels=Object.keys(mo).sort();charts.cash=new Chart(cash,{type:'bar',data:{labels,datasets:[{label:'Pemasukan',data:labels.map(k=>mo[k][0]),backgroundColor:'#36d399'},{label:'Pengeluaran',data:labels.map(k=>mo[k][1]),backgroundColor:'#fb7185'}]},options:{responsive:true,plugins:{legend:{labels:{color:'#ddd'}}},scales:{x:{ticks:{color:'#aaa'}},y:{ticks:{color:'#aaa'}}}}});charts.cat=new Chart(cat,{type:'doughnut',data:{labels:Object.keys(ca),datasets:[{data:Object.values(ca),backgroundColor:['#60a5fa','#36d399','#fbbf24','#fb7185','#a78bfa','#22d3ee']}]},options:{plugins:{legend:{labels:{color:'#ddd'}}}}})}load();
</script></body></html>
