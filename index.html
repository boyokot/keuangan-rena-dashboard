<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Keuangan Rena</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script><style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap');
:root{--bg:#f7f5ff;--card:#fff;--line:#e8e3f4;--text:#17131f;--muted:#756e82;--purple:#7c3aed;--lime:#c8ff4d;--coral:#ff6b6b;--blue:#4f7cff;--green:#09a66d;--red:#ef476f;--gold:#a16207;--shadow:0 10px 0 #17131f}
body.dark{--bg:#121019;--card:#1d1927;--line:#393146;--text:#faf8ff;--muted:#aaa2b5;--gold:#ffd166;--shadow:0 9px 0 #050407}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px 'DM Sans',system-ui,sans-serif;transition:.25s;background-image:radial-gradient(circle at 7% 5%,#c8ff4d55 0 8%,transparent 22%),radial-gradient(circle at 95% 0,#ff7a9050 0 9%,transparent 24%)}.wrap{max-width:1180px;margin:auto;padding:26px 22px 90px}header{position:relative;display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;background:linear-gradient(120deg,#7c3aed,#a855f7 55%,#ff6b8a);color:#fff;border:2px solid #17131f;border-radius:28px;padding:24px 26px;box-shadow:var(--shadow);overflow:hidden}header:after{content:'✦';position:absolute;right:44%;top:-21px;font-size:95px;color:#c8ff4d55;transform:rotate(16deg)}h1{font-family:'Space Grotesk',sans-serif;margin:0;font-size:clamp(27px,5vw,40px);letter-spacing:-1.4px}.eyebrow{font-weight:800;text-transform:uppercase;letter-spacing:1.4px;font-size:11px;color:var(--lime);margin-bottom:5px}.subtitle{color:#f4eefe}.actions{display:flex;gap:8px;align-items:center;z-index:1}button,select{min-height:44px;background:#fff;color:#17131f;border:2px solid #17131f;border-radius:999px;padding:9px 14px;font:700 13px 'DM Sans';box-shadow:3px 3px 0 #17131f;cursor:pointer}button:hover,select:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 #17131f}button:focus,select:focus{outline:2px dashed var(--lime);outline-offset:3px}.theme{width:44px;padding:0}.status{margin:17px 4px 0;color:var(--muted);font-size:12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}.card{background:var(--card);border:2px solid #17131f;border-radius:22px;padding:18px;box-shadow:5px 5px 0 #17131f;transition:transform .18s,box-shadow .18s}.card:hover{transform:translateY(-3px);box-shadow:7px 9px 0 #17131f}.grid .card:nth-child(1){background:#e8ffae}.grid .card:nth-child(2){background:#ffd8df}.grid .card:nth-child(3){background:#dcd2ff}.grid .card:nth-child(4){background:#cce8ff}.dark .grid .card{color:#17131f}.label{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.65px;color:#544c61}.value{font-family:'Space Grotesk';font-size:clamp(23px,3vw,30px);font-weight:700;margin-top:9px;letter-spacing:-1px}.good{color:#087954}.bad{color:#c52b50}.gold{color:#5b21b6}.two{display:grid;grid-template-columns:1.25fr .75fr;gap:14px;margin-top:16px}h3{font-family:'Space Grotesk';font-size:18px;margin:0 0 16px;letter-spacing:-.4px}table{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}th,td{padding:12px 9px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.7px}td.num{text-align:right;font-weight:700}.pill{display:inline-block;padding:5px 9px;border:1px solid currentColor;border-radius:999px;font-weight:800;font-size:11px}.tipe-pemasukan{background:#d1fae5;color:#047857}.tipe-pengeluaran{background:#ffe4e6;color:#be123c}.tipe-transfer{background:#dbeafe;color:#1d4ed8}.tipe-piutang{background:#fef3c7;color:#a16207}.tipe-opname-koreksi{background:#e5e7eb;color:#4b5563}.tipe-hutang{background:#ede9fe;color:#6d28d9}.tipe-lainnya{background:#f3e8ff;color:#7e22ce}.dark .tipe-pemasukan,.dark .tipe-pengeluaran,.dark .tipe-transfer,.dark .tipe-piutang,.dark .tipe-opname-koreksi,.dark .tipe-hutang,.dark .tipe-lainnya{filter:saturate(.85) brightness(.9)}.bar{height:13px;background:#ece8f3;border:1px solid #17131f;border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#7c3aed,#ff5f8f,#c8ff4d);border-right:1px solid #17131f;transition:width .7s cubic-bezier(.2,.8,.2,1)}.thumb{width:58px;height:46px;object-fit:cover;border-radius:10px;border:2px solid #17131f;cursor:pointer;box-shadow:2px 2px 0 #17131f}.proof{color:var(--purple);font-weight:700}.modal{position:fixed;inset:0;background:#120d1dcc;backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal img{max-width:95vw;max-height:90vh;border-radius:20px;border:3px solid #fff}.scroll{overflow:auto}.section-title{display:flex;align-items:center;gap:9px}.sticker{display:inline-grid;place-items:center;width:34px;height:34px;border:2px solid #17131f;border-radius:10px;background:var(--lime);transform:rotate(-5deg)}.bottom-nav{display:none}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.two{grid-template-columns:1fr}header{padding:21px}.actions{width:100%}.actions select{flex:1}}@media(max-width:560px){.wrap{padding:14px 12px 92px}.grid{gap:10px}.grid .card{padding:14px;border-radius:18px}.value{font-size:21px}.label{font-size:10px}header{border-radius:22px}.actions button:not(.theme){font-size:0}.actions button:not(.theme):after{content:'↻';font-size:18px}.card.scroll{margin-left:-2px;margin-right:-2px;padding:14px 9px}th:nth-child(3),td:nth-child(3){display:none}th,td{font-size:12px;padding:10px 6px}.bottom-nav{position:fixed;display:flex;bottom:12px;left:50%;transform:translateX(-50%);z-index:8;background:#17131f;color:#fff;border-radius:999px;padding:6px;box-shadow:0 10px 30px #0005}.bottom-nav a{color:#fff;text-decoration:none;padding:10px 15px;border-radius:999px;font-size:12px;font-weight:700;transition:background .2s,color .2s}.bottom-nav a.active{background:var(--lime);color:#17131f}}@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style></head><body><div class="wrap"><header><div><div class="eyebrow">Money era ✦</div><h1>Keuangan Rena</h1><div class="subtitle">Uang terarah, goals makin dekat.</div></div><div class="actions"><select id="bulan" aria-label="Filter bulan" onchange="render()"><option value="all">Semua bulan</option></select><button onclick="load()">↻ Refresh</button><button class="theme" onclick="toggleTheme()" aria-label="Ganti tema">◐</button></div></header><div id="status" class="status">Lagi ambil data terbaru…</div><main id="main" style="display:none"><section class="grid" id="overview"><div class="card"><div class="label">💸 Uang masuk</div><div id="in" class="value good"></div></div><div class="card"><div class="label">🛍️ Uang keluar</div><div id="out" class="value bad"></div></div><div class="card"><div class="label">✨ Saldo sekarang</div><div id="saldo" class="value gold"></div></div><div class="card"><div class="label">🧾 Transaksi</div><div id="count" class="value"></div></div></section><section class="two"><div class="card"><h3>Cash flow check</h3><canvas id="cash"></canvas></div><div class="card"><h3>Spending vibe</h3><canvas id="cat"></canvas></div></section><section class="card" id="goals" style="margin-top:16px"><h3 class="section-title"><span class="sticker">★</span> Goals yang lagi dikejar</h3><div id="targets"></div></section><section class="card scroll" id="activity" style="margin-top:16px"><h3 class="section-title"><span class="sticker">↗</span> Aktivitas terbaru</h3><table><thead><tr><th>Tanggal</th><th>Keterangan</th><th>Kategori</th><th>Tipe</th><th>Nominal</th><th>Bukti</th></tr></thead><tbody id="trx"></tbody></table></section></main></div><nav class="bottom-nav"><a href="#overview">Home</a><a href="#goals">Goals</a><a href="#activity">Aktivitas</a></nav><div class="modal" id="modal" onclick="this.style.display='none'"><img id="big" alt="Bukti transaksi"></div><script>
const SID='1D6D6MQzfKGNbrJrQuaeAcL_nngnkbwpJUfDCSP0THuE';let all=[],targets=[],charts={};const rp=n=>'Rp '+Math.round(Number(n)||0).toLocaleString('id-ID');
function n(v){if(typeof v==='number')return v;return Number(String(v||'').replace(/[^0-9,-]/g,'').replace(/\./g,'').replace(',','.'))||0}function date(v){if(v instanceof Date)return v;let s=String(v||''),m=s.match(/Date\((\d+),(\d+),(\d+)/);if(m)return new Date(+m[1],+m[2],+m[3]);let p=s.split(' '),mm={Jan:0,Feb:1,Mar:2,Apr:3,Mei:4,Jun:5,Jul:6,Agu:7,Sep:8,Okt:9,Nov:10,Des:11};return p.length===3&&mm[p[1]]!==undefined?new Date(+p[2],mm[p[1]],+p[0]):new Date(s)}
async function sheet(name){let u=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&_=${Date.now()}`,t=await(await fetch(u,{cache:'no-store'})).text(),j=JSON.parse(t.slice(t.indexOf('{'),t.lastIndexOf('}')+1));return (j.table.rows||[]).map(r=>(r.c||[]).map(c=>c?(c.f??c.v??''):''))}
function direct(u){let s=String(u||''),m=s.match(/\/d\/([\w-]+)/);return m?`https://drive.google.com/thumbnail?id=${m[1]}&sz=w1200`:s}function proof(u){if(!u)return'—';let d=direct(u),img=/drive\.google|\.(jpg|jpeg|png|webp)(\?|$)/i.test(u);return img?`<img class="thumb" src="${d}" onclick="show('${d}')" onerror="this.outerHTML='<a class=proof target=_blank href=${u}>Buka</a>'">`:`<a class="proof" target="_blank" href="${u}">Buka</a>`}function show(u){big.src=u;modal.style.display='flex'}
async function load(){let statusEl=document.getElementById('status');statusEl.style.display='block';statusEl.textContent='Memuat data terbaru…';try{let [tr,tg]=await Promise.all([sheet('Transaksi'),sheet('Target Tabungan')]);all=tr.filter(r=>(r[0]||r[1])&&String(r[0]).toLowerCase()!=='tanggal').map(r=>({tgl:r[0],d:date(r[0]),ket:r[1],kat:r[2],tipe:r[3],nom:n(r[4]),akun:r[5],bukti:r[6]}));targets=tg.filter(r=>r[0]).map(r=>({name:r[0],goal:n(r[1]),got:n(r[2]),deadline:r[5]}));let months=[...new Set(all.filter(x=>!isNaN(x.d)).map(x=>`${x.d.getFullYear()}-${String(x.d.getMonth()+1).padStart(2,'0')}`))].sort().reverse();bulan.innerHTML='<option value="all">Semua bulan</option>'+months.map(x=>`<option>${x}</option>`).join('');render();main.style.display='block';statusEl.textContent='';statusEl.style.display='none'}catch(e){statusEl.style.display='block';statusEl.textContent='❌ Gagal memuat: '+e.message;console.error(e)}}
function tipeClass(t){let s=String(t||'lainnya').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');return 'tipe-'+(s||'lainnya')}
function render(){let b=bulan.value,a=b==='all'?all:all.filter(x=>`${x.d.getFullYear()}-${String(x.d.getMonth()+1).padStart(2,'0')}`===b),inc=a.filter(x=>x.tipe==='Pemasukan').reduce((s,x)=>s+x.nom,0),exp=a.filter(x=>x.tipe==='Pengeluaran').reduce((s,x)=>s+x.nom,0);document.getElementById('in').textContent=rp(inc);out.textContent=rp(exp);saldo.textContent=rp(inc-exp);count.textContent=a.length;trx.innerHTML=[...a].reverse().slice(0,100).map(x=>`<tr><td>${x.tgl}</td><td>${x.ket}</td><td>${x.kat}</td><td><span class="pill ${tipeClass(x.tipe)}">${x.tipe||'Lainnya'}</span></td><td class="num">${rp(x.nom)}</td><td>${proof(x.bukti)}</td></tr>`).join('')||'<tr><td colspan=6>Belum ada transaksi</td></tr>';targetsEl=document.getElementById('targets');targetsEl.innerHTML=targets.map(x=>{let p=x.goal?Math.min(100,x.got/x.goal*100):0;return`<div style="margin:14px 0"><b>${x.name}</b><span style="float:right">${rp(x.got)} / ${rp(x.goal)} (${p.toFixed(1)}%)</span><div class="bar" style="clear:both;margin-top:8px"><div class="fill" style="width:${p}%"></div></div><small>Sisa ${rp(Math.max(0,x.goal-x.got))}${x.deadline?' · Deadline '+x.deadline:''}</small></div>`}).join('');draw(a)}
function draw(a){let ink=document.body.classList.contains('dark')?'#ddd6e8':'#544c61',mo={},ca={};a.forEach(x=>{let k=isNaN(x.d)?'Lainnya':`${x.d.getFullYear()}-${String(x.d.getMonth()+1).padStart(2,'0')}`;mo[k]??=[0,0];if(x.tipe==='Pemasukan')mo[k][0]+=x.nom;if(x.tipe==='Pengeluaran'){mo[k][1]+=x.nom;ca[x.kat]=(ca[x.kat]||0)+x.nom}});Object.values(charts).forEach(c=>c.destroy());let labels=Object.keys(mo).sort();charts.cash=new Chart(cash,{type:'bar',data:{labels,datasets:[{label:'Pemasukan',data:labels.map(k=>mo[k][0]),backgroundColor:'#36d399'},{label:'Pengeluaran',data:labels.map(k=>mo[k][1]),backgroundColor:'#fb7185'}]},options:{responsive:true,plugins:{legend:{labels:{color:ink}}},scales:{x:{ticks:{color:ink}},y:{ticks:{color:ink}}}}});charts.cat=new Chart(cat,{type:'doughnut',data:{labels:Object.keys(ca),datasets:[{data:Object.values(ca),backgroundColor:['#60a5fa','#36d399','#fbbf24','#fb7185','#a78bfa','#22d3ee']}]},options:{plugins:{legend:{labels:{color:ink}}}}})}function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('rena-theme',document.body.classList.contains('dark')?'dark':'light');draw(bulan.value==='all'?all:all.filter(x=>`${x.d.getFullYear()}-${String(x.d.getMonth()+1).padStart(2,'0')}`===bulan.value))}if(localStorage.getItem('rena-theme')==='dark')document.body.classList.add('dark');load();
const navLinks=[...document.querySelectorAll('.bottom-nav a')];function setActiveNav(id){navLinks.forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+id))}navLinks.forEach(a=>a.addEventListener('click',()=>setActiveNav(a.getAttribute('href').slice(1))));setActiveNav(location.hash.slice(1)||'overview');if('IntersectionObserver'in window){let navObserver=new IntersectionObserver(entries=>{let visible=entries.filter(e=>e.isIntersecting).sort((a,b)=>b.intersectionRatio-a.intersectionRatio)[0];if(visible)setActiveNav(visible.target.id)},{rootMargin:'-20% 0px -55%',threshold:[0,.25,.5]});['overview','goals','activity'].forEach(id=>{let el=document.getElementById(id);if(el)navObserver.observe(el)})}
</script></body></html>
